# TinyURL API token — required alongside discord_token.
# Discord attachment URLs have expiring query params that Discord strips
# when proxying — TinyURL preserves them. Without this, thumbnails won't show.
# Get a free token at: https://tinyurl.com/tools/api
# Keep this secret!
tinyurl_token=